apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: deepharness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: deepharness/api-gateway:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: deepharness
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
