# DeepHarness Backend 运行时配置
# 优先级：环境变量 > config.yaml > 代码默认值

server:
  port: "8080"

session:
  store_type: "memory"
  message_store_type: "memory"
  timeout: "30m"
  max_messages: 1000

broker:
  type: "memory"

agent:
  base_url: "http://localhost:19090"
  orchestrator_url: "http://localhost:8084"
  request_timeout: "120s"

websocket:
  reconnect_history_limit: 50
  write_timeout: "10s"

database:
  host: "127.0.0.1"
  port: "5433"
  user: "deepharness"
  password: "deepharness"
  name: "deepharness"

redis:
  url: ""

repository:
  root: "/var/deepharness/workspace"
