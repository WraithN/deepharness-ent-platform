# DeepHarness Backend 运行时配置
# 优先级：环境变量 > config.yaml > 代码默认值

server:
  port: "8080"

session:
  store_type: "memory"
  message_store_type: "memory"
  timeout: "30m"
  max_messages: 1000

broker:
  type: "memory"

gatewayd:
  admin_url: "http://127.0.0.1:2346"
  agent_id: "claude-code"

agui:
  workspace: "/home/nan/deepharness-ent-platform"

websocket:
  reconnect_history_limit: 50
  write_timeout: "10s"

database:
  host: "127.0.0.1"
  port: "5433"
  user: "deepharness"
  password: "deepharness"
  name: "deepharness"

redis:
  url: ""

repository:
  root: "/home/nan/test"

workitem:
  platforms:
    - meego
    - jira
  sync:
    interval: "5m"
    workers: 4
    timeout: "30s"
  writeback:
    enabled: true
    workers: 2
    retry: 3
